name: check
on:
    push:
    pull_request:
        branches:
            - main
jobs:
    check:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6

            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint & Test build
              run: pnpm check
